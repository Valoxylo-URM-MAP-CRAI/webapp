<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>VALOBOIS – Mes évaluations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>

<body class="day-mode">
    <script>
        (function () {
            try {
                var v = localStorage.getItem('valobois_lang');
                if (v === 'en' || v === 'fr') document.documentElement.lang = v;
            } catch (e) { /* ignore */ }
        })();
    </script>
    <div class="auth-top-banner mes-eval-page-banner" role="toolbar" data-i18n-aria-label="banner.toolbarDisplay"
        aria-label="Affichage">
        <span id="auth-header-status" aria-live="polite"></span>
        <label id="valobois-lang-label" class="sr-only" for="valobois-lang-select" data-i18n="banner.langSelectLabel">Langue</label>
        <select id="valobois-lang-select" class="auth-lang-select" aria-labelledby="valobois-lang-label">
            <option value="fr" data-i18n="lang.optionFr">Français</option>
            <option value="en" data-i18n="lang.optionEn">English</option>
        </select>
    </div>
    <main class="auth-main mes-eval-main">
        <div class="card auth-card mes-eval-card">
            <h1 class="auth-title" data-i18n="mesEval.title">Mes évaluations</h1>

            <p id="mesEvalConfigHint" class="auth-config-hint" hidden>
                <span data-i18n="mesEval.configHintBefore">La configuration Firebase n’est pas renseignée. Éditez </span><code>js/config/firebase-config.js</code><span data-i18n="mesEval.configHintAfter">.</span>
            </p>

            <p id="mesEvalError" class="auth-error" role="alert" hidden></p>

            <p id="mesEvalLoading" class="mes-eval-loading" data-i18n="mesEval.loading">Chargement…</p>

            <div id="mesEvalToolbar" class="mes-eval-toolbar hidden">
                <a class="btn btn-primary" id="mesEvalNewEvalLink" href="index.html?eval=new" data-i18n="mesEval.newEval">Nouvelle évaluation</a>
            </div>

            <ul id="mesEvalList" class="mes-eval-list hidden" data-i18n-aria-label="mesEval.listAria" aria-label="Liste des évaluations"></ul>

            <p id="mesEvalEmpty" class="mes-eval-empty hidden" data-i18n="mesEval.empty">Aucune évaluation enregistrée dans le nuage pour ce
                compte.</p>
        </div>
    </main>

    <script defer src="js/i18n/valobois-locales.js"></script>
    <script defer src="js/i18n/valobois-i18n.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
    <script defer src="js/config/firebase-config.js"></script>
    <script defer src="js/lib/firebase-app-auth.js"></script>
    <script defer src="js/app/auth-header.js"></script>
    <script defer src="js/app/mes-evaluations-page.js"></script>
</body>

</html>
